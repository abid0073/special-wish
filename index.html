<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Birthday Magic ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: white;
           font-family: 'Comfortaa', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        #text-container {
            position: absolute;
            left: 5%;
            top: 45%;
            transform: translateY(-50%);
            width: 40%;
            opacity: 0;
            transition: opacity 2s ease;
            z-index: 10;
        }

        .line {
            font-size: 1.8rem;
            margin-bottom: 10px;
            display: block;
            line-height: 1.2;
            color: #ffb3c1;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        #canvas-container {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 60px;
            width: 550px;
            height: 650px;
            transition: all 2.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            z-index: 5;
        }

        #base-line {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            height: 40px;
            background-color: #FFD700;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            z-index: 2;
        }

        #base-line span {
            color: #3d2b1f;
            font-family: 'Special Elite',cursive;
            font-weight: bold;
            font-size: 12px;
            letter-spacing: 1.5px;
        }

        canvas { width: 100%; height: 100%; }

        @media (max-width: 768px) {
            #canvas-container { width: 340px; height: 480px; bottom: 55px; }
            #base-line { width: 95%; height: 35px; }
            .line { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <div id="text-container"></div>
    
    <div id="base-line">
        <span>ABID's CREATION</span>
    </div>

    <div id="canvas-container">
        <canvas id="treeCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 600;
        canvas.height = 700;

        const messages = [
            "Hey you 💕",
            "HaPpY bIrThDaY🎂",
            "May ALLAH bless you 🎈",
            "And give u many happiness ❤️",
            "Just saying...You're pretty awesome😊",
            "Sending good vibes 😉",
            "Hope u have a great day today 💕"
          
        ];

        function drawHeart(x, y, size, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.bezierCurveTo(x, y - size/2, x - size, y - size/2, x - size, y);
            ctx.bezierCurveTo(x - size, y + size/1.5, x, y + size * 1.5, x, y + size * 1.5);
            ctx.bezierCurveTo(x, y + size * 1.5, x + size, y + size/1.5, x + size, y);
            ctx.bezierCurveTo(x + size, y - size/2, x, y - size/2, x, y);
            ctx.fill();
        }

        let heartCount = 0;
        const colors = ['#ff4d6d', '#ff758f', '#ffb3c1', '#ff0054', '#c9184a', '#ff8fab'];

        function animateTree() {
            
            ctx.fillStyle = '#ffb3c1';
            ctx.fillRect(294, 520, 12, 180); 

            function addHearts() {
               
                if (heartCount < 2121) { 
                    let t = Math.random() * Math.PI * 2;
                    
                    let r = Math.pow(Math.random(), 0.5) * 180; 
                    
                    let x = 300 + 16 * Math.pow(Math.sin(t), 3) * (r/10);
                    let y = 300 - (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * (r/10);
                    
                    
                    let size = Math.random() * 6 + 9; 
                    drawHeart(x, y, size, colors[Math.floor(Math.random() * colors.length)]);
                    
                    heartCount++;
                  
                    heartCount % 4 === 0 ? requestAnimationFrame(addHearts) : addHearts();
                }
            }
            addHearts();
        }

        function typeWriter() {
            let lineIndex = 0;
            const container = document.getElementById('text-container');
            container.style.opacity = "1";
            function type() {
                if (lineIndex < messages.length) {
                    let div = document.createElement('div');
                    div.className = 'line';
                    container.appendChild(div);
                    let charIndex = 0, str = messages[lineIndex];
                    let timer = setInterval(() => {
                        div.innerHTML += str[charIndex];
                        charIndex++;
                        if (charIndex === str.length) { 
                            clearInterval(timer); 
                            lineIndex++; 
                            setTimeout(type, 500); 
                        }
                    }, 50);
                }
            }
            type();
        }

        animateTree(); 

        setTimeout(() => {
            // গাছ ডানে সরবে
            document.getElementById('canvas-container').style.left = "75%";
            setTimeout(typeWriter, 1200); 
        }, 3500);
    </script>
</body>
</html>
